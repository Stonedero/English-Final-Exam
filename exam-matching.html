<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#060b18;--bg2:#0c1228;--s1:rgba(255,255,255,.05);--s2:rgba(255,255,255,.08);
  --b1:rgba(245,181,60,.16);--b2:rgba(255,255,255,.09);
  --gold:#f5b53c;--gold2:#c48a18;--g3:rgba(245,181,60,.1);--g4:rgba(245,181,60,.06);
  --indigo:#8b7cf8;--i2:rgba(139,124,248,.12);--cyan:#22d3ee;--c2:rgba(34,211,238,.1);
  --ok:#10b981;--ok2:rgba(16,185,129,.12);--ng:#ef4444;--ng2:rgba(239,68,68,.12);
  --cream:#ede5d6;--txt:#cac1b0;--muted:rgba(202,193,176,.44);
  --r:14px;--r2:10px;--r3:8px;
  --fa:'Tajawal',sans-serif;--fe:'Playfair Display',serif;
  --fb:'Outfit',sans-serif;--fm:'IBM Plex Mono',monospace;
}
*,::before,::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(245,181,60,.05),transparent 60%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-20%;right:-15%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(139,124,248,.04),transparent 60%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(245,181,60,.2);border-radius:4px;}
@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideD{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pop{0%{transform:scale(.9)}65%{transform:scale(1.04)}100%{transform:scale(1)}}
.rise{animation:rise .6s cubic-bezier(.16,1,.3,1) both;}
.d1{animation-delay:.07s}.d2{animation-delay:.14s}.d3{animation-delay:.21s}.d4{animation-delay:.28s}.d5{animation-delay:.35s}
/* COMPONENTS */
.pill{display:inline-flex;padding:3px 10px;border-radius:6px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pill-gold{background:var(--g3);color:var(--gold);border:1px solid rgba(245,181,60,.28);}
.pill-indigo{background:var(--i2);color:var(--indigo);border:1px solid rgba(139,124,248,.28);}
.pill-cyan{background:var(--c2);color:var(--cyan);border:1px solid rgba(34,211,238,.28);}
.pill-ok{background:var(--ok2);color:var(--ok);border:1px solid rgba(16,185,129,.28);}
.pill-ng{background:var(--ng2);color:var(--ng);border:1px solid rgba(239,68,68,.28);}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:24px;}
.divider{text-align:center;margin:24px 0;position:relative;}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.06);}
.divider span{position:relative;background:var(--bg);padding:0 14px;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
/* BUTTONS */
.btn{padding:11px 22px;border-radius:var(--r2);border:none;font-family:var(--fb);font-size:.86rem;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;}
.btn:disabled{opacity:.4;pointer-events:none;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#06090f;font-weight:700;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(245,181,60,.28);}
.btn-ghost{background:var(--s1);border:1px solid var(--b2);color:var(--txt);}
.btn-ghost:hover{background:var(--s2);}
.btn-ok{background:linear-gradient(135deg,var(--ok),#059669);color:#fff;}
.btn-ok:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(16,185,129,.28);}
.btn-ng{background:var(--ng2);border:1px solid rgba(239,68,68,.3);color:var(--ng);}
.btn-ng:hover{background:rgba(239,68,68,.2);}
.btn-indigo{background:var(--i2);border:1px solid rgba(139,124,248,.28);color:var(--indigo);}
.btn-indigo:hover{background:rgba(139,124,248,.2);}
/* TOP NAV */
.top-nav{position:sticky;top:0;z-index:400;background:rgba(6,11,24,.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--b1);}
.top-nav-inner{max-width:1200px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.nav-logo{font-family:var(--fe);font-size:1rem;font-weight:900;color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-logo span{font-family:var(--fa);font-size:.75rem;color:var(--muted);}
.nav-back{font-family:var(--fa);font-size:.8rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .17s;}
.nav-back:hover{color:var(--gold);}
/* PROGRESS BAR */
.progress-bar{background:rgba(255,255,255,.07);border-radius:3px;height:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
/* TIMER */
.timer-chip{font-family:var(--fm);font-size:.95rem;font-weight:500;background:var(--g4);border:1px solid rgba(245,181,60,.26);border-radius:var(--r2);padding:7px 14px;color:var(--gold);min-width:78px;text-align:center;transition:all .35s;}
.timer-chip.warn{color:#fb923c;background:rgba(251,146,60,.1);border-color:rgba(251,146,60,.3);}
.timer-chip.danger{color:var(--ng);background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);animation:blink .7s infinite;}
/* SCORE RING */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ring-wrap svg{filter:drop-shadow(0 0 22px rgba(245,181,60,.2));}
.ring-inner{position:absolute;display:flex;flex-direction:column;align-items:center;}
.ring-pct{font-family:var(--fe);font-size:2.5rem;font-weight:900;color:var(--gold);line-height:1;}
.ring-sub{font-family:var(--fm);font-size:.6rem;color:var(--muted);margin-top:2px;}
/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);z-index:900;align-items:center;justify-content:center;padding:20px;}
.overlay.on{display:flex;}
.dialog{background:#0d1428;border:1px solid var(--b1);border-radius:18px;padding:32px;max-width:460px;width:100%;animation:pop .28s ease both;}
.dialog h3{font-family:var(--fe);font-size:1.4rem;font-weight:900;color:var(--cream);margin-bottom:8px;}
.dialog p{font-family:var(--fa);font-size:.87rem;color:var(--muted);direction:rtl;line-height:1.75;margin-bottom:20px;}
/* RESPONSIVE */
@media(max-width:700px){.top-nav-inner{padding:10px 16px;}}

</style>

.page{max-width:860px;margin:0 auto;padding:24px 20px 80px;position:relative;z-index:1;}
.ex-header{text-align:center;margin-bottom:36px;}
.ex-kicker{display:inline-flex;align-items:center;gap:7px;background:rgba(139,124,248,.12);border:1px solid rgba(139,124,248,.28);border-radius:50px;padding:5px 16px;font-size:.62rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--indigo);margin-bottom:16px;}
.ex-h1{font-family:var(--fe);font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;color:var(--cream);margin-bottom:6px;}
.ex-sub{font-family:var(--fa);font-size:.88rem;color:var(--muted);direction:rtl;}
.ex-card{background:var(--s1);border:1px solid rgba(139,124,248,.2);border-radius:16px;padding:26px;margin-bottom:18px;position:relative;overflow:hidden;}
.ex-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--indigo),#6d58f5,transparent 75%);}
.ex-num{font-family:var(--fm);font-size:.65rem;color:var(--indigo);background:rgba(139,124,248,.12);border:1px solid rgba(139,124,248,.22);border-radius:6px;padding:3px 10px;margin-bottom:12px;display:inline-block;}
.ex-instr-ar{font-family:var(--fa);font-size:.82rem;color:rgba(245,181,60,.8);direction:rtl;text-align:right;background:var(--g4);border:1px solid rgba(245,181,60,.14);border-radius:8px;padding:9px 12px;margin-bottom:12px;}
.ex-instr-en{font-family:var(--fe);font-size:.72rem;font-style:italic;color:var(--muted);margin-bottom:14px;}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.col-lbl{font-family:var(--fm);font-size:.57rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:7px;}
.mitem{background:rgba(255,255,255,.04);border:1.5px solid var(--b2);border-radius:8px;padding:9px 12px;font-size:.82rem;cursor:pointer;transition:all .17s;margin-bottom:5px;display:flex;align-items:center;gap:8px;user-select:none;}
.mitem:hover{border-color:rgba(245,181,60,.4);background:var(--g4);color:var(--cream);}
.mitem.sel{border-color:var(--gold);background:var(--g4);color:var(--gold);}
.mitem.paired{border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.07);color:var(--cyan);}
.midx{font-family:var(--fm);font-size:.6rem;color:var(--muted);flex-shrink:0;width:16px;}
.mpair-tag{margin-left:auto;font-family:var(--fm);font-size:.58rem;color:var(--cyan);display:none;}
.mitem.paired .mpair-tag{display:inline;}
.match-status{font-family:var(--fa);font-size:.74rem;color:var(--muted);text-align:center;margin-top:8px;}
.saved-ind{font-family:var(--fa);font-size:.7rem;color:var(--ok);text-align:center;margin-top:4px;min-height:16px;}

.results-hidden{display:none;}

.grade-badge{display:inline-block;padding:8px 28px;border-radius:50px;font-family:var(--fa);font-weight:900;font-size:1rem;margin:10px 0;}
.res-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
.rbc{background:rgba(255,255,255,.04);border:1px solid var(--b2);border-radius:12px;padding:14px;text-align:center;}
.rbc-n{font-family:var(--fe);font-size:1.7rem;font-weight:900;}
.rbc-l{font-family:var(--fa);font-size:.65rem;color:var(--muted);margin-top:3px;}
.pair-result{display:flex;align-items:center;gap:7px;font-size:.8rem;padding:6px 10px;border-radius:7px;margin-bottom:5px;}
.pair-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);}
.pair-ng{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);}
.pair-a{color:var(--muted);font-family:var(--fm);font-size:.65rem;flex-shrink:0;}
.pair-b{font-weight:600;}
.pair-ok .pair-b{color:var(--ok);} .pair-ng .pair-b{color:var(--ng);}

.actions-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}

    <p style="font-family:var(--fa);font-size:.82rem;color:var(--muted);direction:rtl;" id="matchNote"></p>
    <div class="res-breakdown">
      <div class="rbc"><div class="rbc-n" style="color:var(--ok);" id="resOk">0</div><div class="rbc-l">صحيح</div></div>
      <div class="rbc"><div class="rbc-n" style="color:var(--ng);" id="resNg">0</div><div class="rbc-l">خطأ</div></div>
      <div class="rbc"><div class="rbc-n" style="color:var(--gold);" id="resPct">0%</div><div class="rbc-l">النسبة</div></div>
    </div>
  </div>
  <div id="matchDetailWrap" class="rise d1"></div>
  <div class="actions-row">
    <button class="btn btn-gold" onclick="retryMatch()">↺ إعادة المحاولة</button>
    <a class="btn btn-ghost" href="index.html">← الرئيسية</a>
  </div>
</div>
<script>
const MATCH_Q=[
  {id:'m1',ar:'وصّل الأفعال في القائمة A بالأسماء في القائمة B',en:'Match verbs (List A) with nouns (List B)',listA:['do','Watch','score','kick','put out','write'],listB:['a goal','fires','gymnastics','a letter','TV','a ball'],ans:{0:2,1:4,2:0,3:5,4:1,5:3}},
  {id:'m2',ar:'وصّل الأفعال في القائمة A بالأسماء في القائمة B',en:'Match verbs (List A) with nouns (List B)',listA:['watch','Write','Have','spend','borrow','cut'],listB:['a picnic','the morning','a letter','hair','TV','a book'],ans:{0:4,1:2,2:0,3:1,4:5,5:3}},
  {id:'m3',ar:'وصّل الكلمات لتكوين أسماء مركبة (Compound Nouns)',en:'Match words to make compound nouns',listA:['insect','Car','Video','Air','swimming','sun'],listB:['game','pool','roof','park','proof','bag'],ans:{0:4,1:3,2:0,3:5,4:1,5:2}},
  {id:'m4',ar:'وصّل الأفعال في القائمة A بالأسماء في القائمة B',en:'Match verbs (List A) with nouns (List B)',listA:['Score','do','go','Spend','Win','kick'],listB:['to the cinema','a game','the afternoon','a goal','a hobby','a ball'],ans:{0:3,1:4,2:0,3:2,4:1,5:5}}
];
let mPairs={},mShuffle={},mSelA={};
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
const $=id=>document.getElementById(id);
function buildExercises(){
  const wrap=$('exercisesWrap');wrap.innerHTML='';
  MATCH_Q.forEach((q,ei)=>{
    mPairs[ei]={};mSelA[ei]=null;mShuffle[ei]=shuf(q.listB.map((w,i)=>{return{w,i};}));
    const card=document.createElement('div');card.className='ex-card';
    card.innerHTML=`<div class="ex-num">Exercise ${ei+1} / ${MATCH_Q.length}</div>
      <div class="ex-instr-ar">${q.ar}</div>
      <div class="ex-instr-en">${q.en}</div>
      <div class="match-cols" id="mcols-${ei}"></div>
      <div class="match-status" id="mst-${ei}">0/${q.listA.length} مُربوط</div>
      <div class="saved-ind" id="mind-${ei}"></div>`;
    wrap.appendChild(card);
    renderMatchCols(ei);
  });
}
function renderMatchCols(ei){
  const q=MATCH_Q[ei];const pairs=mPairs[ei];const sb=mShuffle[ei];const selA=mSelA[ei];
  const aH=q.listA.map((w,ai)=>{const bi=pairs[ai];const paired=bi!==undefined;
    return `<div class="mitem${selA===ai?' sel':paired?' paired':''}" onclick="mA(${ei},${ai})"><span class="midx">${ai+1}.</span><span>${w}</span><span class="mpair-tag">${paired?'→ '+q.listB[bi]:''}</span></div>`;
  }).join('');
  const bH=sb.map((it,si)=>{const used=Object.values(pairs).includes(it.i);
    return `<div class="mitem${used?' paired':''}" onclick="mB(${ei},${it.i})"><span class="midx">${String.fromCharCode(97+si)}.</span><span>${it.w}</span></div>`;
  }).join('');
  const el=$('mcols-'+ei);
  el.innerHTML=`<div><div class="col-lbl">List A — القائمة أ</div>${aH}</div><div><div class="col-lbl">List B — القائمة ب</div>${bH}</div>`;
  const done=Object.keys(pairs).length,tot=q.listA.length;
  $('mst-'+ei).textContent=done+'/'+tot+' مُربوط'+(selA!==null?' — اضغط من B الآن':'');
  $('mind-'+ei).textContent=done>0?'✔ '+done+' ربط محفوظ':'';
}
function mA(ei,ai){const pairs=mPairs[ei];if(pairs[ai]!==undefined){delete pairs[ai];mSelA[ei]=null;}else mSelA[ei]=(mSelA[ei]===ai)?null:ai;renderMatchCols(ei);}
function mB(ei,bi){if(mSelA[ei]===null)return;const ai=mSelA[ei];const pairs=mPairs[ei];Object.keys(pairs).forEach(k=>{if(pairs[k]===bi)delete pairs[k];});pairs[ai]=bi;mSelA[ei]=null;renderMatchCols(ei);}
function checkAllMatch(){
  let totalOk=0,totalNg=0;
  const detailWrap=$('matchDetailWrap');detailWrap.innerHTML='';
  MATCH_Q.forEach((q,ei)=>{
    let exOk=0;const pairs=mPairs[ei]||{};
    const card=document.createElement('div');
    card.className='ex-card';card.style.marginBottom='16px';
    let pairsHtml='';
    q.listA.forEach((w,ai)=>{
      const ui=pairs[ai],ri=q.ans[ai],ok=ui===ri;
      if(ok){exOk++;totalOk++;}else totalNg++;
      pairsHtml+=`<div class="pair-result ${ok?'pair-ok':'pair-ng'}"><span class="pair-a">${ai+1}. ${w}</span><span style="color:var(--muted);margin:0 5px;">→</span><span class="pair-b">${ui!==undefined?q.listB[ui]:'—'}</span>${!ok?`<span class="pair-c">✓ ${q.listB[ri]}</span>`:''}</div>`;
    });
    const pct=Math.round(exOk/q.listA.length*100);
    card.innerHTML=`<div class="ex-num">Exercise ${ei+1} — ${exOk}/${q.listA.length} (${pct}%)</div><div class="ex-instr-ar">${q.ar}</div>${pairsHtml}`;
    detailWrap.appendChild(card);
  });
  const total=totalOk+totalNg,pct=total?Math.round(totalOk/total*100):0;
  $('matchBigScore').textContent=totalOk+' / '+total;
  $('resOk').textContent=totalOk;$('resNg').textContent=totalNg;$('resPct').textContent=pct+'%';
  let g,c,n;
  if(pct>=90){g='ممتاز 🏆';c='var(--ok)';n='أداء استثنائي في التوصيلات!';}
  else if(pct>=75){g='جيد جداً ⭐';c='var(--gold)';n='أداء رائع — واصل!';}
  else if(pct>=60){g='جيد 👍';c='var(--indigo)';n='راجع الإجابات الخاطئة.';}
  else{g='تحتاج مراجعة';c='var(--ng)';n='راجع جداول التوصيلات وحاول مجدداً.';}
  const gb=$('matchGrade');gb.textContent=g;gb.style.cssText=`background:${c}20;color:${c};border:1px solid ${c}44;`;
  $('matchNote').textContent=n;
  $('examSection').style.display='none';$('resultsSection').classList.remove('results-hidden');
  window.scrollTo(0,0);
}
function resetAllMatch(){buildExercises();}
function retryMatch(){
  MATCH_Q.forEach((_,ei)=>{mPairs[ei]={};mSelA[ei]=null;});
  $('resultsSection').classList.add('results-hidden');
  $('examSection').style.display='block';
  buildExercises();window.scrollTo(0,0);
}
buildExercises();
</script></body></html>
