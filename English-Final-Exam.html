<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Exam · الثالث المتوسط</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg: #060b18;
  --bg2: #0c1228;
  --bg3: #111a32;
  --s0: rgba(255,255,255,.03);
  --s1: rgba(255,255,255,.05);
  --s2: rgba(255,255,255,.08);
  --s3: rgba(255,255,255,.12);
  --b1: rgba(245,181,60,.16);
  --b2: rgba(255,255,255,.09);
  --b3: rgba(255,255,255,.14);
  --gold: #f5b53c;
  --gold2: #c48a18;
  --gold3: rgba(245,181,60,.1);
  --gold4: rgba(245,181,60,.06);
  --indigo: #8b7cf8;
  --indigo2: rgba(139,124,248,.12);
  --cyan: #22d3ee;
  --cream: #ede5d6;
  --txt: #cac1b0;
  --muted: rgba(202,193,176,.44);
  --ok: #10b981;
  --ok2: rgba(16,185,129,.12);
  --ok3: rgba(16,185,129,.22);
  --ng: #ef4444;
  --ng2: rgba(239,68,68,.12);
  --ng3: rgba(239,68,68,.22);
  --r: 14px;
  --r2: 10px;
  --r3: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --shadow2: 0 8px 40px rgba(0,0,0,.5);
  --fa: 'Tajawal', sans-serif;
  --fe: 'Playfair Display', serif;
  --fb: 'Outfit', sans-serif;
  --fm: 'IBM Plex Mono', monospace;
}
*, ::before, ::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content:''; position:fixed; top:-30%; left:-20%; width:70%; height:70%;
  background: radial-gradient(ellipse, rgba(245,181,60,.05) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
body::after {
  content:''; position:fixed; bottom:-20%; right:-15%; width:55%; height:55%;
  background: radial-gradient(ellipse, rgba(139,124,248,.04) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(245,181,60,.2); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:rgba(245,181,60,.38); }

.scr { display:none; min-height:100vh; position:relative; z-index:1; }
.scr.on { display:block; }

/* ── Animations ── */
@keyframes rise { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
@keyframes slideR { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }
@keyframes pop { 0% { transform:scale(.9); } 65% { transform:scale(1.03); } 100% { transform:scale(1); } }
@keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
@keyframes glow { 0%,100% { box-shadow:0 0 0 rgba(245,181,60,0); } 50% { box-shadow:0 0 22px rgba(245,181,60,.3); } }
.rise { animation: rise .6s cubic-bezier(.16,1,.3,1) both; }
.d1{animation-delay:.07s} .d2{animation-delay:.14s} .d3{animation-delay:.21s} .d4{animation-delay:.28s}

/* ══════════════════════════════
   START SCREEN
══════════════════════════════ */
#sStart.on { display:flex; align-items:center; justify-content:center; padding:48px 20px; }
.sw { max-width:580px; width:100%; }

.exam-kicker {
  display:inline-flex; align-items:center; gap:8px;
  background: linear-gradient(135deg, rgba(245,181,60,.12), rgba(245,181,60,.04));
  border: 1px solid rgba(245,181,60,.3);
  border-radius:50px; padding:6px 18px;
  font-size:.62rem; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color: var(--gold); margin-bottom:24px;
}
.exam-kicker::before { content:'◈'; font-size:10px; }

.s-h1 {
  font-family: var(--fe);
  font-size: clamp(2rem, 6vw, 3.8rem);
  font-weight:900; line-height:1.04;
  color: var(--cream); margin-bottom:8px;
}
.s-h1 em { color:var(--gold); font-style:italic; }
.s-sub { font-family:var(--fa); font-size:.9rem; color:var(--muted); direction:rtl; margin-bottom:28px; line-height:1.85; }

.gl { width:48px; height:2px; background:linear-gradient(90deg,var(--gold),transparent); margin-bottom:28px; }

.s-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:24px; }
.s-stat {
  background: var(--s1); border:1px solid var(--b1);
  border-radius:var(--r); padding:18px 8px; text-align:center;
  position:relative; overflow:hidden;
}
.s-stat::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.s-stat-n { font-family:var(--fe); font-size:2.1rem; font-weight:900; color:var(--gold); line-height:1; }
.s-stat-l { font-family:var(--fa); font-size:.58rem; color:var(--muted); margin-top:4px; }

.s-instr {
  background:var(--s1); border:1px solid var(--b1);
  border-radius:var(--r); padding:20px 22px;
  margin-bottom:22px; direction:rtl;
}
.s-instr-title { font-family:var(--fa); font-weight:900; color:var(--gold); font-size:.92rem; margin-bottom:12px; }
.s-instr-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
.s-instr-list li {
  font-family:var(--fa); font-size:.83rem; color:var(--txt);
  line-height:1.7; padding-right:18px; position:relative;
}
.s-instr-list li::before { content:'›'; position:absolute; right:0; color:var(--gold); font-size:1.1rem; font-weight:700; line-height:1.5; }
.s-instr-list b { color:var(--gold); }

.s-btn-start {
  width:100%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color:#06090f; border:none; border-radius:var(--r);
  padding:17px; font-family:var(--fe);
  font-size:1.05rem; font-weight:700;
  cursor:pointer; transition:transform .2s, box-shadow .2s;
  position:relative; overflow:hidden; letter-spacing:.3px;
}
.s-btn-start::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.15),transparent); }
.s-btn-start:hover { transform:translateY(-3px); box-shadow:0 16px 50px rgba(245,181,60,.3); }

/* ══════════════════════════════
   EXAM SCREEN
══════════════════════════════ */
#sExam.on { display:flex; flex-direction:column; }

/* ── Top Bar ── */
.tbar {
  position:sticky; top:0; z-index:400;
  background:rgba(6,11,24,.96); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b1);
}
.tbar-row {
  max-width:1260px; margin:0 auto;
  padding:10px 24px;
  display:flex; align-items:center; gap:14px;
}
.timer {
  font-family:var(--fm); font-size:1.02rem; font-weight:500;
  background: var(--gold4); border:1px solid rgba(245,181,60,.28);
  border-radius:var(--r2); padding:7px 15px;
  color:var(--gold); min-width:84px; text-align:center;
  transition:all .35s; flex-shrink:0; letter-spacing:.5px;
}
.timer.warn { color:#fb923c; background:rgba(251,146,60,.1); border-color:rgba(251,146,60,.3); }
.timer.danger { color:var(--ng); background:rgba(239,68,68,.1); border-color:rgba(239,68,68,.3); animation:blink .7s infinite; }

.tbar-prog { flex:1; display:flex; flex-direction:column; gap:5px; }
.tbar-prog-track { background:rgba(255,255,255,.07); border-radius:3px; height:5px; overflow:hidden; }
.tbar-prog-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:3px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.tbar-prog-info { display:flex; justify-content:space-between; font-size:.62rem; font-family:var(--fm); color:var(--muted); }

.btn-end {
  background:linear-gradient(135deg, var(--ok), #059669);
  color:#fff; border:none; border-radius:var(--r2);
  padding:9px 17px; font-family:var(--fa); font-size:.8rem; font-weight:700;
  cursor:pointer; flex-shrink:0; transition:all .2s;
  display:flex; align-items:center; gap:6px;
}
.btn-end:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(16,185,129,.28); }

/* ── Category Navigator ── */
.cat-nav { max-width:1260px; margin:0 auto; padding:10px 24px; display:grid; grid-template-columns:1fr 1fr; gap:10px; border-bottom:1px solid rgba(255,255,255,.05); }

.cat-nav-bar { background:var(--s1); border:1px solid var(--b2); border-radius:var(--r); overflow:hidden; transition:all .2s; position:relative; }
.cat-nav-bar:hover { border-color:var(--b3); }
.cat-nav-bar.expanded { border-color:rgba(245,181,60,.3); }

.cat-nav-header {
  display:flex; align-items:center; gap:12px;
  padding:11px 16px; cursor:pointer; user-select:none;
}
.cat-icon { font-size:1.1rem; flex-shrink:0; }
.cat-info { flex:1; min-width:0; }
.cat-title { font-family:var(--fa); font-size:.8rem; font-weight:700; color:var(--cream); }
.cat-subtitle { font-family:var(--fm); font-size:.58rem; color:var(--muted); margin-top:1px; }
.cat-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.cat-pill { font-family:var(--fm); font-size:.65rem; color:var(--muted); background:var(--s2); border-radius:20px; padding:3px 9px; }
.cat-pill.warm { color:var(--gold); }
.cat-bar-mini { width:80px; height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }
.cat-fill-read { background:linear-gradient(90deg,var(--indigo),var(--cyan)); }
.cat-fill-match { background:linear-gradient(90deg,var(--gold),var(--gold2)); }
.cat-chevron { color:var(--muted); font-size:.7rem; transition:transform .3s cubic-bezier(.4,0,.2,1); flex-shrink:0; }
.cat-nav-bar.expanded .cat-chevron { transform:rotate(180deg); color:var(--gold); }

/* Dropdown */
.cat-dropdown {
  max-height:0; overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1);
  border-top:0px solid transparent;
}
.cat-nav-bar.expanded .cat-dropdown {
  max-height:480px; overflow-y:auto;
  border-top:1px solid var(--b2);
}
.cat-dropdown::-webkit-scrollbar { width:3px; }
.cat-dropdown::-webkit-scrollbar-thumb { background:rgba(245,181,60,.2); }

.drop-section { padding:8px 0; }
.drop-sec-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 16px; cursor:default;
}
.drop-sec-name { font-family:var(--fa); font-size:.75rem; font-weight:700; color:var(--gold); }
.drop-sec-count { font-family:var(--fm); font-size:.6rem; color:var(--muted); }
.drop-sec-divider { height:1px; background:rgba(255,255,255,.05); margin:0 16px; }

.drop-q-item {
  display:flex; align-items:center; gap:10px;
  padding:7px 16px 7px 22px; cursor:pointer;
  transition:background .15s; position:relative;
}
.drop-q-item:hover { background:rgba(255,255,255,.04); }
.drop-q-item.current { background:rgba(245,181,60,.07); }
.drop-q-item.current::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--gold); }
.drop-q-num { font-family:var(--fm); font-size:.6rem; color:var(--muted); flex-shrink:0; width:28px; }
.drop-q-txt { font-family:var(--fb); font-size:.76rem; color:var(--txt); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.drop-q-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.drop-q-dot.answered { background:var(--gold); }
.drop-q-dot.unanswered { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.2); }
.drop-q-type { font-size:.55rem; padding:2px 6px; border-radius:4px; flex-shrink:0; font-weight:600; text-transform:uppercase; }
.qt-tf { background:rgba(139,124,248,.15); color:var(--indigo); }
.qt-wh { background:rgba(34,211,238,.12); color:var(--cyan); }
.qt-mt { background:rgba(245,181,60,.12); color:var(--gold); }

/* ── Exam Body ── */
.ebody {
  max-width:1260px; margin:0 auto;
  padding:22px 24px 70px;
  display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;
}
.ebody.nopass { grid-template-columns:minmax(0,740px); justify-content:center; }

/* Passage */
.pcol { position:sticky; top:112px; }
.pbox {
  background:rgba(255,246,220,.023);
  border:1px solid rgba(245,181,60,.1);
  border-radius:var(--r); overflow:hidden;
}
.pbox-head { padding:13px 17px; border-bottom:1px solid rgba(245,181,60,.07); display:flex; align-items:flex-start; gap:10px; }
.pbox-info { flex:1; }
.plbl { font-size:.55rem; text-transform:uppercase; letter-spacing:3px; color:var(--gold); font-weight:700; margin-bottom:3px; }
.ptitle-en { font-family:var(--fe); font-size:.95rem; font-weight:700; color:var(--cream); }
.ptitle-ar { font-family:var(--fa); font-size:.72rem; color:var(--muted); direction:rtl; text-align:right; margin-top:2px; }

.btn-trans {
  background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.22);
  border-radius:var(--r3); padding:6px 10px; cursor:pointer;
  display:flex; align-items:center; gap:5px;
  transition:all .18s; flex-shrink:0;
}
.btn-trans:hover { background:rgba(34,211,238,.16); transform:scale(1.04); }
.btn-trans.active { background:rgba(34,211,238,.18); border-color:rgba(34,211,238,.4); }
.btn-trans.out { background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.08); cursor:not-allowed; opacity:.45; pointer-events:none; }
.btn-trans-lbl { font-family:var(--fa); font-size:.68rem; font-weight:700; color:var(--cyan); }
.btn-trans.out .btn-trans-lbl { color:var(--muted); }
.trans-uses {
  background:var(--cyan); color:#06090f;
  border-radius:50%; width:17px; height:17px;
  font-family:var(--fm); font-size:.58rem; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.btn-trans.out .trans-uses { background:rgba(255,255,255,.15); color:var(--muted); }

.pbody {
  padding:18px; max-height:calc(100vh - 270px); overflow-y:auto;
  position:relative;
  -webkit-user-select:none; -moz-user-select:none; user-select:none;
}
.pbody p { font-family:'Crimson Pro',serif; font-size:1.1rem; line-height:1.95; color:rgba(237,229,214,.84); margin-bottom:.9em; }
.pbody p:last-child { margin-bottom:0; }
.pass-ar { display:none; direction:rtl; }
.pass-ar.show { display:block; }
.pass-ar p { font-family:var(--fa); font-size:1rem; line-height:1.9; color:rgba(237,229,214,.88); }
.pass-en.hide { display:none; }
.trans-cd {
  display:none; position:absolute; top:10px; right:10px;
  background:rgba(34,211,238,.15); border:1px solid rgba(34,211,238,.3);
  border-radius:var(--r3); padding:4px 9px;
  font-family:var(--fm); font-size:.68rem; color:var(--cyan);
  align-items:center; gap:5px;
}
.trans-cd.show { display:flex; }
.pinstr { background:var(--gold4); border:1px solid rgba(245,181,60,.16); border-radius:var(--r3); padding:9px 13px; margin-top:10px; font-family:var(--fa); font-size:.78rem; color:rgba(245,181,60,.82); direction:rtl; text-align:right; line-height:1.65; }

/* ── Question Card ── */
.qcard {
  background:var(--s1); border:1px solid var(--b1);
  border-radius:var(--r); padding:26px; position:relative; overflow:hidden;
}
.qcard::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--gold2),transparent 75%); }
.qcard.match-card::before { background:linear-gradient(90deg,var(--indigo),var(--cyan),transparent 75%); }

.qhead { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.qnum-badge { font-family:var(--fm); font-size:.64rem; color:var(--gold); background:var(--gold4); border:1px solid rgba(245,181,60,.22); border-radius:6px; padding:3px 10px; }
.qtype-pill { display:inline-flex; padding:3px 10px; border-radius:6px; font-size:.58rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.qt-pill-tf { background:rgba(139,124,248,.12); color:var(--indigo); border:1px solid rgba(139,124,248,.25); }
.qt-pill-wh { background:rgba(34,211,238,.1); color:var(--cyan); border:1px solid rgba(34,211,238,.24); }
.qt-pill-mt { background:rgba(245,181,60,.1); color:var(--gold); border:1px solid rgba(245,181,60,.24); }
.qsec-label { font-size:.58rem; color:var(--muted); font-style:italic; margin-left:auto; }

.qtxt { font-family:var(--fe); font-size:1.06rem; font-weight:700; color:var(--cream); line-height:1.58; margin-bottom:6px; }

/* Question translation */
.q-trans-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.btn-q-trans { background:rgba(34,211,238,.07); border:1px solid rgba(34,211,238,.2); border-radius:6px; padding:4px 10px; cursor:pointer; font-family:var(--fa); font-size:.67rem; color:var(--cyan); font-weight:600; transition:all .17s; display:flex; align-items:center; gap:5px; }
.btn-q-trans:hover { background:rgba(34,211,238,.14); }
.btn-q-trans.out { opacity:.4; cursor:not-allowed; pointer-events:none; }
.q-trans-ar { display:none; font-family:var(--fa); font-size:.8rem; color:rgba(202,193,176,.68); direction:rtl; text-align:right; line-height:1.65; border-right:2px solid rgba(245,181,60,.2); padding-right:10px; flex:1; }
.q-trans-ar.show { display:block; }
.q-trans-cd { font-family:var(--fm); font-size:.65rem; color:var(--cyan); flex-shrink:0; display:none; }
.q-trans-cd.show { display:inline; }

/* TF Buttons */
.tf-row { display:flex; gap:10px; }
.tf-btn {
  flex:1; padding:15px; border-radius:11px;
  border:1.5px solid var(--b2); background:transparent;
  font-family:var(--fe); font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .18s; color:var(--muted); position:relative;
}
.tf-btn:hover { border-color:rgba(245,181,60,.45); color:var(--cream); background:var(--gold4); }
.tf-btn.sel {
  border-color:var(--gold); color:#06090f;
  background:linear-gradient(135deg, var(--gold), var(--gold2)); font-weight:900;
}
.tf-saved { font-family:var(--fa); font-size:.7rem; color:var(--ok); margin-top:8px; text-align:right; direction:rtl; min-height:18px; }

/* WH Input */
.wh-area {
  width:100%; background:rgba(255,255,255,.04);
  border:1.5px solid var(--b2); border-radius:var(--r2);
  padding:13px 15px; color:var(--cream);
  font-family:var(--fb); font-size:.9rem; line-height:1.65;
  resize:vertical; outline:none; transition:all .2s; min-height:62px;
}
.wh-area:focus { border-color:var(--gold); background:rgba(245,181,60,.04); box-shadow:0 0 0 3px rgba(245,181,60,.07); }
.wh-area::placeholder { color:rgba(255,255,255,.13); }
.wh-hint { font-family:var(--fa); font-size:.7rem; color:var(--muted); margin-top:6px; direction:rtl; text-align:right; }
.q-saved { font-family:var(--fa); font-size:.7rem; color:var(--ok); margin-top:4px; text-align:right; direction:rtl; min-height:16px; }

/* Match */
.match-header { background:var(--gold4); border:1px solid rgba(245,181,60,.15); border-radius:var(--r3); padding:10px 13px; margin-bottom:14px; }
.match-h-ar { font-family:var(--fa); font-size:.8rem; color:rgba(245,181,60,.85); direction:rtl; text-align:right; line-height:1.6; }
.match-h-en { font-family:var(--fe); font-size:.7rem; font-style:italic; color:var(--muted); margin-top:2px; }
.match-cols { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.match-col-lbl { font-family:var(--fm); font-size:.57rem; font-weight:700; color:var(--muted); letter-spacing:2px; text-transform:uppercase; text-align:center; margin-bottom:7px; }
.mitem {
  background:rgba(255,255,255,.04); border:1.5px solid var(--b2);
